{% extends 'base.html' %}

{% block title %}
    Secure Login | My Task Manager
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 sm:mt-16 px-4">
    <!-- 🌌 গ্লাসমরফিজম লগইন কার্ড (Glassmorphism Login Card) -->
    <div class="backdrop-blur-lg bg-slate-900/40 border border-slate-800/80 rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-6 sm:p-8">
            
            <!-- লক আইকন এবং হেডার টাইটেল -->
            <div class="flex flex-col items-center justify-center text-center mb-8">
                <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 mb-3 border border-indigo-500/20 shadow-lg">
                    <i class="fas fa-lock text-lg"></i>
                </div>
                <h3 class="text-xl font-black text-white tracking-wide">Account Authentication</h3>
                <p class="text-xs text-slate-400 mt-1">Enter your credentials to access the workspace stream</p>
            </div>
            
            <!-- লগইন ফর্ম -->
            <form method="POST" class="space-y-5 text-slate-300">
                {% csrf_token %}
                
                <!-- জ্যাঙ্গো ফর্মের ইনপুট ফিল্ড রেন্ডারিং এরিয়া -->
                <div class="space-y-4">
                    {{ form.as_p }}
                </div>

                <!-- প্রবেশ করুন (Submit Button) -->
                <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-950/50 transition-all duration-200 active:scale-[0.99] flex items-center justify-center space-x-2 mt-6">
                    <i class="fas fa-sign-in-alt text-sm"></i>
                    <span>Authenticate Session</span>
                </button>
            </form>

            <!-- রেজিস্ট্রেশন লিঙ্ক গেটওয়ে -->
            <div class="mt-6 pt-5 border-t border-slate-800/60 text-center">
                <p class="text-xs text-slate-400">
                    New to this workspace? 
                    <a href="{% url 'register' %}" class="text-emerald-400 hover:text-emerald-300 font-bold ml-1 transition-colors underline underline-offset-4">
                        Create an Account
                    </a>
                </p>
            </div>

        </div>
    </div>
</div>

<!-- 🟢 জ্যাঙ্গো লগইন ফর্মের উইজেট অটো-স্টাইলিং এবং গ্লোবাল হ্যাক -->
<style>
    /* জ্যাঙ্গো ডিফল্ট {{ form.as_p }} এর লেবেল এবং ইনপুটগুলোকে মডার্ন ডার্ক লুকে রূপান্তর */
    .space-y-4 p {
        margin-bottom: 1.25rem !important;
    }
    .space-y-4 label {
        display: block !important;
        position: relative !important;
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
        font-size: 0.75rem !important;
        font-weight: 600 !important;
        color: #94a3b8 !important; /* text-slate-400 */
        margin-bottom: 0.5rem !important;
    }
    .space-y-4 input {
        width: 100% !important;
        background-color: rgba(2, 6, 23, 0.5) !important;
        border: 1px solid rgba(51, 65, 85, 0.5) !important;
        border-radius: 0.75rem !important;
        padding: 0.75rem 1rem !important;
        font-size: 0.875rem !important;
        color: #fff !important;
        transition: all 0.2s !important;
        outline: none !important;
    }
    .space-y-4 input:focus {
        border-color: rgba(99, 102, 241, 0.6) !important; /* indigo-500 */
        box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.3) !important;
    }
    /* ইউজারনেম হেল্প টেক্সট ও এরর মেসেজ হাইড/ক্লিন করা */
    .helptext, .errorlist {
        display: none !important;
    }
</style>
{% endblock %}
