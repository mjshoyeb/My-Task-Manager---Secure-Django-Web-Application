{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center">লগইন করুন</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3">একাউন্ট নেই? <a href="{% url 'register' %}">রেজিস্ট্রেশন করুন</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
